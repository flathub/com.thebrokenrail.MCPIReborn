app-id: com.thebrokenrail.MCPIReborn

# No Separate Locales
separate-locales: false

# MCPI Itself Is Proprietary
tags:
  - proprietary

# Runtime/SDK
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20

# Startup Command
command: minecraft-pi-reborn

# Permissions
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --socket=pulseaudio
  - --allow=multiarch

# MCPI-Reborn Git
x-mcpi-reborn-git: &mcpi-reborn-git
    type: git
    url: https://gitea.thebrokenrail.com/minecraft-pi-reborn/minecraft-pi-reborn.git
    commit: b59352d5bee81bfeb80cf4e3ec5b835fdeced0b8

# Build
modules:
  # MCPI-Reborn
  - name: minecraft-pi-reborn
    buildsystem: simple
    build-commands:
      - ./scripts/build.mjs flatpak host --install
    build-options:
        append-path: /usr/lib/sdk/node20/bin
        env:
            # Node.js Packages
            npm_config_cache: /run/build/minecraft-pi-reborn/flatpak-node/npm-cache
    sources:
      - *mcpi-reborn-git
      # Node.js Dependencies (Generated With flatpak-node-generator)
      - generated-sources.json

# Cleanup
cleanup:
  - /include
  - /lib/pkgconfig
  - '*.a'
