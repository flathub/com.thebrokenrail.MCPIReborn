app-id: com.thebrokenrail.MCPIReborn

# No Separate Locales
separate-locales: false

# MCPI Itself Is Proprietary
tags:
  - proprietary

# Runtime/SDK
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20

# Startup Command
command: minecraft-pi-reborn

# Permissions
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --socket=pulseaudio
  - --allow=multiarch

# MCPI-Reborn Git
x-mcpi-reborn-git: &mcpi-reborn-git
    type: git
    url: https://gitea.thebrokenrail.com/minecraft-pi-reborn/minecraft-pi-reborn.git
    tag: 3.0.0
    commit: 9b7edfa9b2e67c31aa57738702a7f77e873e2dd8

# Build
modules:
  # MCPI-Reborn
  - name: minecraft-pi-reborn
    buildsystem: simple
    build-commands:
      - ./scripts/build.mjs flatpak host --install
    build-options:
        append-path: /usr/lib/sdk/node20/bin
        env:
            # Node.js Packages
            npm_config_cache: /run/build/minecraft-pi-reborn/flatpak-node/npm-cache
    sources:
      - *mcpi-reborn-git
      # Node.js Dependencies (Generated With flatpak-node-generator)
      - generated-sources.json
    modules:
      # QEMU Dependencies
      - name: distlib
        buildsystem: simple
        build-commands:
          - pip install --prefix=/app --no-build-isolation .
        sources:
          - type: archive
            url: https://github.com/pypa/distlib/archive/refs/tags/0.4.0.tar.gz
            sha256: 98fb21cbb8c43d3deafc688ff58e024e79712568e837407d16b7037cd28d0041

# Cleanup
cleanup:
  - /include
  - /lib/pkgconfig
  - '*.a'
